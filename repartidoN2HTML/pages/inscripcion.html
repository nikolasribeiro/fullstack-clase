<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Inscripción</title>
  </head>
  <body>
    <a href="../../">Volver al MainHub</a>
    <hr />
    <header>
      <h1>Formulario de Inscripción</h1>
    </header>

    <nav>
      <a href="../index.html">Inicio</a>
    </nav>

    <main>
      <section>
        <h2>Anotate a la Expo</h2>
        <form
          action="#"
          method="POST"
          id="form-inscripcion"
          class="formulario-estilo"
        >
          <div>
            <label for="nombre">Nombre:</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Ingresa tu nombre"
              required
            />
          </div>
          <br />
          <div>
            <label for="apellido">Apellido:</label>
            <input
              type="text"
              id="apellido"
              name="apellido"
              placeholder="Ingresa tu apellido"
              required
            />
          </div>
          <br />
          <div>
            <label for="correo">Correo electrónico:</label>
            <input
              type="email"
              id="correo"
              name="correo"
              placeholder="ejemplo@correo.com"
              required
            />
          </div>
          <br />
          <div>
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" value="18" required />
          </div>
          <br />
          <div>
            <label for="curso">Curso de interés:</label>
            <select id="curso" name="curso">
              <option value="html">HTML y CSS</option>
              <option value="js">JavaScript</option>
              <option value="php">PHP y MySQL</option>
            </select>
          </div>
          <br />
          <div>
            <p>Turno preferido:</p>
            <input
              type="radio"
              id="manana"
              name="turno"
              value="manana"
              required
            />
            <label for="manana">Mañana</label>
            <input type="radio" id="tarde" name="turno" value="tarde" />
            <label for="tarde">Tarde</label>
          </div>
          <br />
          <div>
            <input
              type="checkbox"
              id="condiciones"
              name="condiciones"
              required
            />
            <label for="condiciones"
              >Acepto las condiciones de participación</label
            >
          </div>
          <br />
          <button type="submit" value="Enviar">Enviar Inscripción</button>
        </form>
      </section>
    </main>
    <footer>
      <p>Expo Joven Full Stack 2026</p>
    </footer>
  </body>
</html>
