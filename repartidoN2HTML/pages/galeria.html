<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Galería Multimedia</title>
  </head>
  <body>
    <a href="../../">Volver al MainHub</a>
    <hr />
    <header>
      <h1>Galería del Evento</h1>
    </header>

    <nav>
      <a href="../index.html">Volver al Inicio</a>
    </nav>

    <main>
      <section>
        <h2>Fotos del salón y preparativos</h2>
        <div>
          <img
            style="width: 30rem"
            src="../img/portada.jpg"
            alt="Salón principal"
          />
          <img
            style="width: 30rem"
            src="../img/taller1.jpg"
            alt="Aulas preparadas"
          />
        </div>
      </section>

      <section>
        <h2>Video Promocional</h2>
        <div>
          <video src="../assets/video/presentacion.mp4" controls width="400">
            Tu navegador no soporta el elemento de video.
          </video>
        </div>
      </section>

      <section>
        <h2>Audio de Bienvenida</h2>
        <p>Escucha el mensaje del equipo organizador:</p>
        <div>
          <audio src="../assets/audio/bienvenida.mp3" controls>
            Tu navegador no soporta el elemento de audio.
          </audio>
        </div>
      </section>
    </main>
    <footer>
      <p>Expo Joven Full Stack 2026</p>
    </footer>
  </body>
</html>
